if loadfont /boot/grub/fonts/unicode.pf2; then
  set gfxmode=auto
  insmod all_video
  insmod gfxterm
  terminal_output gfxterm
fi

set theme=/boot/grub/themes/venomOS/theme.txt
export theme

set default=0
set timeout=8

menuentry "VenomOS 1.0 — Live" {
  linux /live/vmlinuz boot=live components splash quiet hostname=venomOS username=venom
  initrd /live/initrd
}

menuentry "VenomOS 1.0 — Live (safe graphics)" {
  linux /live/vmlinuz boot=live components splash quiet hostname=venomOS username=venom nomodeset
  initrd /live/initrd
}

menuentry "VenomOS 1.0 — Live (failsafe)" {
  linux /live/vmlinuz boot=live components memtest noapic noapm nodma nomce nolapic nomodeset nosmp nosplash vga=normal hostname=venomOS username=venom
  initrd /live/initrd
}

menuentry "System Memory Test (memtest86+)" {
  linux16 /boot/memtest86+x64.efi
}
