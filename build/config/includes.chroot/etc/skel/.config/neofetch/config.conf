# VenomOS neofetch configuration

print_info() {
    prin ""
    info "  OS"       distro
    info "  Kernel"   kernel
    info "  Uptime"   uptime
    info "  Shell"    shell
    info "  DE"       de
    info "  Terminal" term
    info "  CPU"      cpu
    info "  Memory"   memory
    prin ""
    prin "  ${c2}▓▓▓${c3}▓▓▓${c4}▓▓▓${c5}▓▓▓${c6}▓▓▓${c1}▓▓▓${c7}▓▓▓${c8}▓▓▓"
    prin ""
}

# VenomOS custom ASCII art
ascii_distro="auto"

custom_ascii() {
cat << 'EOF'
${c2} __   _____ _  _  ___  __  __  ___  ___
${c2} \ \ / / __| \| |/ _ \|  \/  |/ _ \/ __|
${c2}  \ V /| _|| .` | (_) | |\/| | (_) \__ \
${c2}   \_/ |___|_|\_|\___/|_|  |_|\___/|___/
${c1}
${c1}  Intelligence. Precision. Persistence.
EOF
}

# Use our custom art when distro is VenomOS
if [[ "$distro" == *"VenomOS"* ]] || [[ -f /etc/os-release ]] && grep -q "VenomOS" /etc/os-release 2>/dev/null; then
    image_source="ascii"
    ascii_distro="VenomOS"
fi

# Display settings
image_backend="ascii"
image_source="auto"
ascii_bold="on"
bold="on"
underline_enabled="on"
underline_char="-"

# Colors (green primary, red accent)
colors=(2 2 1 3 4 5 6 7)
color_blocks="on"
block_range=(0 15)
block_width=3
block_height=1

# Info display
separator="  "
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"
memory_percent="on"
memory_unit="mib"
shell_version="on"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
